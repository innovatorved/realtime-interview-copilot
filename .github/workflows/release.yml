name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag name to publish (e.g. v0.4.0-beta). Will be created if it does not exist."
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            artifact_glob: "dist/*.dmg dist/*.zip dist/*.blockmap"
          - os: windows-latest
            artifact_glob: "dist/*.exe dist/*.blockmap"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Setup Node (for electron-builder tooling)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Trust postinstall scripts
        run: bun pm trust --all || true

      - name: Build Electron main + preload
        run: bun run build:electron

      - name: Build Next.js frontend
        run: bun run build

      - name: Package app (electron-builder)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Skip code-signing / notarization for open-source beta builds.
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: bunx electron-builder --publish never

      - name: List built artifacts
        shell: bash
        run: ls -lh dist/ || dir dist

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-artifacts
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.exe
            dist/*.blockmap
          if-no-files-found: warn
          retention-days: 14

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve tag name
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: List release assets
        run: ls -lh release-assets/

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: ${{ steps.tag.outputs.name }}
          draft: false
          # Mark only alpha / rc pre-releases as prerelease; beta builds are
          # promoted to the "Latest" channel so users see them on the Releases
          # page by default.
          prerelease: ${{ contains(steps.tag.outputs.name, 'alpha') || contains(steps.tag.outputs.name, 'rc') }}
          make_latest: "true"
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: |
            release-assets/*.dmg
            release-assets/*.zip
            release-assets/*.exe
            release-assets/*.blockmap

  tap:
    name: Update Homebrew tap
    needs: release
    runs-on: ubuntu-latest
    # Skip gracefully when the tap token is not configured so this job never
    # blocks a release; maintainers can still bump the cask manually.
    if: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}
    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Regenerate cask with new version + sha256
        run: node scripts/update-homebrew-cask.js

      - name: Check for tap token
        id: token
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "$TAP_TOKEN" ]; then
            echo "has_token=false" >> "$GITHUB_OUTPUT"
            echo "::notice::HOMEBREW_TAP_TOKEN not set — skipping tap push. Cask was regenerated locally under homebrew/Casks/."
          else
            echo "has_token=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Push cask to innovatorved/homebrew-tap
        if: steps.token.outputs.has_token == 'true'
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          TAP_DIR="$RUNNER_TEMP/homebrew-tap"
          git clone "https://x-access-token:${GH_TOKEN}@github.com/innovatorved/homebrew-tap.git" "$TAP_DIR"
          mkdir -p "$TAP_DIR/Casks"
          cp homebrew/Casks/realtime-interview-copilot.rb "$TAP_DIR/Casks/realtime-interview-copilot.rb"
          cd "$TAP_DIR"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/realtime-interview-copilot.rb
          if git diff --cached --quiet; then
            echo "No cask changes to commit."
            exit 0
          fi
          git commit -m "realtime-interview-copilot: bump cask for ${{ needs.release.outputs.tag || github.ref_name }}"
          git push origin HEAD
